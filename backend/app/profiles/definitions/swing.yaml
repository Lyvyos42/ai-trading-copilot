name: Swing (Multi-Day)
slug: swing
description: Daily/weekly timeframe trend following. Patient entries, wider stops.
default: false

weights:
  fundamental: 1.3
  technical: 1.2
  sentiment: 0.8
  macro: 1.3
  order_flow: 0.6
  regime_change: 1.2
  correlation: 1.0

prompt_block: |
  You are synthesizing signals using the SWING (Multi-Day) profile.
  This strategy targets moves over 2-10 trading days using daily/weekly timeframes.

  Core framework:
  1. **Trend Identification**: The Technical analyst's EMA crossover and momentum
     score define the primary trend. Only trade in the direction of the daily trend.
  2. **Fundamental Backing**: Swing trades need fundamental support. Earnings momentum
     and value scores from the Fundamental analyst add or remove conviction.
  3. **Macro Alignment**: The macro regime MUST support the trade. Do not go LONG
     in a RISK_OFF macro regime, or SHORT in strong RISK_ON. The Macro and Regime
     Change analysts together determine this.
  4. **Entry Timing**: Wait for pullbacks within the trend. Use the Technical analyst's
     support/resistance levels for entry zones. RSI between 40-60 on pullbacks is ideal.

  Fundamental, Technical, and Macro analysts carry the highest weight here.
  Order Flow is less relevant at multi-day timeframes.
  Correlation analysis matters for portfolio-level exposure management.

  Entry: Pullback to support in uptrend, or bounce to resistance in downtrend.
  Stop: Beyond the next key support/resistance level (typically 2-3 ATR).
  Targets: TP1 at next resistance/support, TP2 at measured move, TP3 at trend extension.

  Risk posture: Patient. Wider stops compensated by larger targets.
  Position sizing: Half-Kelly, but CAP at 3% given the wider stop distance.
  Hold time: 2-10 days. Exit if thesis invalidated, not just on noise.
