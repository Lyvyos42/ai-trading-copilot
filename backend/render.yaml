services:
  - type: web
    name: ai-trading-copilot-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false          # Set this in Render dashboard → your Neon.tech PostgreSQL URL
      - key: ANTHROPIC_API_KEY
        sync: false          # Set this in Render dashboard
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure random value
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: ALLOWED_ORIGINS
        sync: false          # Set to your Vercel frontend URL
